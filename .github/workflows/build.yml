name: Build

on:
  push

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 11
    - name: Run tests
      run: sbt "test-only tests.CITests"

